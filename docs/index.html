<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#6C63FF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="看盤雷達">
<title>🎯 8591 看盤雷達</title>
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #0F0F1A;
    --surface: #1A1A2E;
    --card: #16213E;
    --accent: #6C63FF;
    --accent2: #00D4FF;
    --text: #E8E8F0;
    --muted: #8888AA;
    --green: #00E676;
    --gold: #FFD700;
    --border: #2A2A4A;
    --radius: 16px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, 'Noto Sans TC', BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex; flex-direction: column;
  }

  /* Header */
  header {
    background: linear-gradient(135deg, #1A1A2E 0%, #16213E 100%);
    padding: calc(var(--safe-top) + 16px) 16px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(20px);
  }
  .header-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .logo { font-size: 24px; }
  .title { font-size: 18px; font-weight: 700; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { font-size: 12px; color: var(--muted); }

  /* Game tabs */
  .game-tabs {
    display: flex; gap: 8px; overflow-x: auto;
    padding-bottom: 4px; scrollbar-width: none;
  }
  .game-tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 7px 14px; border-radius: 20px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--surface); color: var(--muted);
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--accent); border-color: var(--accent);
    color: #fff; box-shadow: 0 0 16px rgba(108,99,255,0.4);
  }

  /* Filters */
  .filters {
    background: var(--surface);
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 10px;
  }
  .filter-row { display: flex; gap: 8px; align-items: center; }
  .filter-row label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  input {
    background: var(--card); border: 1.5px solid var(--border);
    color: var(--text); border-radius: 10px;
    padding: 8px 12px; font-size: 14px; width: 100%;
    outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  .price-row { display: flex; gap: 6px; align-items: center; flex: 1; }
  .sep { color: var(--muted); font-size: 14px; flex-shrink: 0; }

  /* Search button */
  .search-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; color: #fff; border-radius: 12px;
    padding: 12px; font-size: 15px; font-weight: 700;
    cursor: pointer; width: 100%; letter-spacing: 0.5px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(108,99,255,0.35);
  }
  .search-btn:active { transform: scale(0.97); }
  .search-btn:disabled { opacity: 0.5; transform: none; }

  /* Status bar */
  .status {
    padding: 8px 16px;
    font-size: 12px; color: var(--muted);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px;
  }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none; flex-shrink: 0;
  }
  .spinner.show { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  .results {
    flex: 1; overflow-y: auto;
    padding: 12px 16px calc(var(--safe-bot) + 12px);
    display: flex; flex-direction: column; gap: 10px;
    align-items: stretch;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    text-decoration: none; color: inherit;
    display: block;
    position: relative; overflow: hidden;
    flex-shrink: 0;
    min-height: 0;
  }
  .card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--accent), var(--accent2));
  }
  .card:active { transform: scale(0.98); box-shadow: 0 0 20px rgba(108,99,255,0.2); border-color: var(--accent); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .card-price {
    font-size: 20px; font-weight: 800;
    color: var(--green);
    white-space: nowrap;
  }
  .card-cp {
    font-size: 12px; font-weight: 600;
    background: rgba(108,99,255,0.15);
    border: 1px solid rgba(108,99,255,0.4);
    color: var(--accent);
    padding: 3px 8px; border-radius: 20px;
    white-space: nowrap;
  }
  .card-title {
    font-size: 14px; line-height: 1.5;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .card-meta {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .badge {
    font-size: 11px; padding: 3px 8px; border-radius: 8px;
    font-weight: 600;
  }
  .badge-gold { background: rgba(255,215,0,0.12); color: var(--gold); border: 1px solid rgba(255,215,0,0.3); }
  .badge-date { background: rgba(0,212,255,0.08); color: var(--accent2); border: 1px solid rgba(0,212,255,0.2); }
  .badge-seller { background: rgba(136,136,170,0.12); color: var(--muted); border: 1px solid var(--border); }

  /* Empty state */
  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 16px; margin-bottom: 6px; color: var(--text); }
  .empty-sub { font-size: 13px; }

  /* Sort bar */
  .sort-bar {
    display: flex; gap: 8px; align-items: center;
    font-size: 12px; color: var(--muted);
    padding: 0 0 4px;
  }
  .sort-btn {
    padding: 4px 10px; border-radius: 8px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); font-size: 11px; cursor: pointer;
    transition: all 0.15s;
  }
  .sort-btn.active { background: rgba(108,99,255,0.15); border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <span class="logo">🎯</span>
    <div>
      <div class="title">8591 看盤雷達</div>
      <div class="subtitle">即時查詢 · Google Sheets 直連</div>
    </div>
  </div>
  <div class="game-tabs" id="gameTabs">
    <div class="tab active" data-sheet="崩鐵" data-type="in_progress">崩鐵在架</div>
    <div class="tab" data-sheet="崩鐵-成交紀錄" data-type="completed">崩鐵成交</div>
    <div class="tab" data-sheet="原神" data-type="in_progress">原神在架</div>
    <div class="tab" data-sheet="原神-成交紀錄" data-type="completed">原神成交</div>
    <div class="tab" data-sheet="鳴潮" data-type="in_progress">鳴潮在架</div>
    <div class="tab" data-sheet="鳴潮-成交紀錄" data-type="completed">鳴潮成交</div>
  </div>
</header>

<div class="filters">
  <div class="filter-row">
    <label>關鍵字</label>
    <input id="keyword" type="text" placeholder="角色名稱、配置關鍵字..." autocomplete="off">
  </div>
  <div class="filter-row">
    <label>預算</label>
    <div class="price-row">
      <input id="minPrice" type="number" placeholder="最低" inputmode="numeric">
      <span class="sep">~</span>
      <input id="maxPrice" type="number" placeholder="最高" inputmode="numeric">
    </div>
    <label style="white-space:nowrap; margin-left:8px;">CP≤</label>
    <input id="maxCp" type="number" placeholder="不限" inputmode="decimal" style="width:80px; flex-shrink:0;">
  </div>
  <button class="search-btn" id="searchBtn" onclick="doSearch()">📡 拉取 &amp; 搜尋</button>
</div>

<div class="status" id="statusBar">
  <div class="spinner" id="spinner"></div>
  <span id="statusText">選擇工作表後按下「拉取 &amp; 搜尋」</span>
</div>

<div class="results" id="results">
  <div class="empty">
    <div class="empty-icon">📊</div>
    <div class="empty-text">準備就緒</div>
    <div class="empty-sub">選遊戲 → 設條件 → 搜尋</div>
  </div>
</div>

<script>
const SHEET_ID = '1SOt-2DwJVEcEgvuvQfAvW6ue6WcrnvywxPbKIJFEcYI';

const COLS = {
  in_progress: { date:0, title:2, price:3, gold:4, cp1:6, seller:12, url:13 },
  completed:   { date:0, title:3, price:4, gold:5, cp1:9, seller:12, url:13 }
};

let currentSheet = '崩鐵';
let currentType  = 'in_progress';
let rawRows = [];
let sortBy = 'cp';  // 'cp' or 'price'

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentSheet = tab.dataset.sheet;
    currentType  = tab.dataset.type;
    rawRows = [];
    renderResults([]);
    setStatus('選好工作表了，點「拉取 & 搜尋」開始查詢');
  });
});

function csvUrl(sheetName) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
}

function parseCSV(text) {
  const rows = [];
  // simple CSV with possible quoted fields
  const lines = text.split(/\r?\n/);
  for (const line of lines) {
    if (!line.trim()) continue;
    const cells = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cells.push(cur); cur = ''; }
      else { cur += ch; }
    }
    cells.push(cur);
    rows.push(cells.map(c => c.trim()));
  }
  return rows.slice(1); // skip header
}

function setStatus(msg, loading=false) {
  document.getElementById('statusText').textContent = msg;
  document.getElementById('spinner').classList.toggle('show', loading);
}

async function doSearch() {
  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  setStatus('連線 Google Sheets 中…', true);

  try {
    const res = await fetch(csvUrl(currentSheet));
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    rawRows = parseCSV(text);
    applyFilter();
  } catch(e) {
    setStatus('❌ 讀取失敗：' + e.message);
  } finally {
    btn.disabled = false;
    document.getElementById('spinner').classList.remove('show');
  }
}

function applyFilter() {
  const kw      = document.getElementById('keyword').value.trim().toLowerCase();
  const pMin    = parseFloat(document.getElementById('minPrice').value) || 0;
  const pMax    = parseFloat(document.getElementById('maxPrice').value) || 999999;
  const cpMax   = parseFloat(document.getElementById('maxCp').value)   || 999;
  const c       = COLS[currentType];

  const matched = [];
  for (const row of rawRows) {
    const g = i => row[i] || '';
    const title  = g(c.title);
    const priceS = g(c.price).replace(/[$,]/g,'');
    const cp1S   = g(c.cp1).replace(/,/g,'');
    const price  = parseFloat(priceS) || 0;
    const cp1    = parseFloat(cp1S)   || 999;

    if (price === 0) continue;
    if (price < pMin || price > pMax) continue;
    if (kw && !title.toLowerCase().includes(kw)) continue;
    if (cpMax < 999 && cp1 > cpMax) continue;

    matched.push({
      title, price, cp1,
      gold:   g(c.gold),
      seller: g(c.seller),
      url:    g(c.url),
      date:   g(c.date).slice(0,10)
    });
  }

  // sort
  matched.sort((a,b) => sortBy === 'cp' ? a.cp1 - b.cp1 : a.price - b.price);

  setStatus(`共 ${rawRows.length} 筆，符合條件 ${matched.length} 筆（依 ${sortBy==='cp'?'CP':'價格'} 由低到高）`);
  renderResults(matched);
}

function renderResults(items) {
  const el = document.getElementById('results');
  if (!items.length) {
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">${rawRows.length ? '🔍' : '📊'}</div>
      <div class="empty-text">${rawRows.length ? '無符合結果' : '尚未拉取資料'}</div>
      <div class="empty-sub">${rawRows.length ? '放寬條件試試看' : '按下搜尋按鈕開始'}</div>
    </div>`;
    return;
  }

  const sortBar = `<div class="sort-bar">
    排序：
    <button class="sort-btn ${sortBy==='cp'?'active':''}" onclick="setSort('cp')">CP↑</button>
    <button class="sort-btn ${sortBy==='price'?'active':''}" onclick="setSort('price')">價格↑</button>
    <span style="margin-left:auto;color:var(--muted)">${items.length} 筆</span>
  </div>`;

  const cards = items.map(r => {
    const href = r.url || '#';
    const cpDisplay = r.cp1 < 900 ? `CP ${r.cp1.toFixed(2)}` : '—';
    return `<a class="card" href="${href}" target="_blank" rel="noopener">
      <div class="card-top">
        <div class="card-price">$${r.price.toLocaleString()}</div>
        <div class="card-cp">${cpDisplay}</div>
      </div>
      <div class="card-title">${escHtml(r.title || '（無標題）')}</div>
      <div class="card-meta">
        ${r.gold ? `<span class="badge badge-gold">⭐ ${r.gold} 金角</span>` : ''}
        ${r.date ? `<span class="badge badge-date">📅 ${r.date}</span>` : ''}
        ${r.seller ? `<span class="badge badge-seller">👤 ${escHtml(r.seller)}</span>` : ''}
      </div>
    </a>`;
  }).join('');

  el.innerHTML = sortBar + cards;
}

function setSort(s) {
  sortBy = s;
  applyFilter();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// PWA service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// Live filter on typing (debounced)
let debTimer;
['keyword','minPrice','maxPrice','maxCp'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    if (!rawRows.length) return;
    clearTimeout(debTimer);
    debTimer = setTimeout(applyFilter, 300);
  });
});
document.getElementById('keyword').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !rawRows.length) doSearch();
});
</script>
</body>
</html>
